<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>T-SHARE · Trải Bài Huyền Học</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --gold:#c9a84c;--gold-l:#e5c97a;--gold-d:#a07c2e;
  --gbg:rgba(201,168,76,.09);--gbrd:rgba(201,168,76,.22);
  --tx:#f0e9d6;--mu:#6e6358;--mu2:#9e8e7a;
  --bg:#0d0b18;--card:#171327;--card2:#1e1a2e;--brd:#252035;
  --red:#e05c5c;
  --r:14px;--rs:10px;
}
html,body{height:100%;overflow:hidden}
body{font-family:'Be Vietnam Pro',sans-serif;background:var(--bg);color:var(--tx)}

/* ══ LAYOUT ══ */
.app{display:flex;height:100vh;width:100%;overflow:hidden}
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}

/* ══ HEADER ══ */
.hd{background:var(--card);border-bottom:1px solid var(--brd);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:10px}
.logo{display:flex;align-items:center;gap:12px}
.logo-name{font-family:'Playfair Display',serif;font-size:26px;color:var(--gold);letter-spacing:.5px}
.logo-div{width:1px;height:28px;background:var(--brd)}
.logo-sub{font-size:11px;font-weight:700;color:var(--mu2);text-transform:uppercase;letter-spacing:1.6px;line-height:1.6}
.hd-cart{background:var(--gold);color:#16100a;border:none;border-radius:99px;padding:10px 20px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;display:none;align-items:center;gap:6px;transition:background .15s}
.hd-cart:active{background:var(--gold-l)}
.cart-num{background:rgba(0,0,0,.2);border-radius:99px;padding:2px 8px;font-size:12px}

/* ══ TABS ══ */
.tabs{display:flex;background:var(--card);border-bottom:1px solid var(--brd);padding:0 16px;gap:4px;flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:14px 18px;font-size:13px;font-weight:700;color:var(--mu);border:none;background:none;cursor:pointer;font-family:inherit;border-bottom:2.5px solid transparent;white-space:nowrap;transition:color .15s,border-color .15s;text-transform:uppercase;letter-spacing:.8px;display:flex;align-items:center;gap:6px}
.tab.on{color:var(--gold);border-bottom-color:var(--gold)}
.tab:hover:not(.on){color:var(--mu2)}

/* ══ CONTENT ══ */
.content{flex:1;overflow-y:auto;padding:20px 24px 28px;-webkit-overflow-scrolling:touch;scrollbar-width:thin;scrollbar-color:var(--brd) transparent}
.content::-webkit-scrollbar{width:4px}
.content::-webkit-scrollbar-thumb{background:var(--brd);border-radius:99px}

/* ══ GROUP LABEL ══ */
.grp{display:flex;align-items:center;gap:10px;margin:22px 0 12px;padding:0 1px}
.grp:first-child{margin-top:0}
.grp-name{font-family:'Playfair Display',serif;font-size:15px;color:var(--gold);white-space:nowrap}
.grp-line{flex:1;height:1px;background:var(--brd)}
.grp-tag{font-size:10px;font-weight:700;padding:3px 11px;border-radius:99px;border:1px solid var(--gbrd);color:var(--gold);white-space:nowrap;text-transform:uppercase;letter-spacing:.5px}

/* ══ PRODUCT GRID (desktop) ══ */
.prod-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.prod-row{background:var(--card);border:1px solid var(--brd);border-radius:var(--r);padding:18px 16px;display:flex;flex-direction:column;gap:10px;cursor:pointer;transition:border-color .15s,transform .15s,box-shadow .15s;position:relative;overflow:hidden}
.prod-row:hover{border-color:var(--gbrd);transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,0,0,.35)}
.prod-row:active{transform:scale(.98)}
.prod-row::after{content:'';position:absolute;inset:0;background:var(--gold);opacity:0;transition:opacity .1s;pointer-events:none}
.prod-row.flash::after{opacity:.06}
.prod-row-top{display:flex;align-items:center;justify-content:space-between}
.prod-ico{font-size:26px;flex-shrink:0}
.prod-info{flex:1}
.prod-name{font-size:15px;font-weight:600;color:var(--tx);line-height:1.4;margin-bottom:4px}
.prod-price{font-size:16px;font-weight:800;color:var(--gold)}
.btn-add{width:36px;height:36px;border-radius:10px;background:var(--gbg);border:1px solid var(--gbrd);font-size:22px;font-weight:700;color:var(--gold);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .12s,transform .1s;line-height:1}
.btn-add:active{transform:scale(.82)}
.btn-add.ok{background:var(--gold)!important;color:#16100a!important;border-color:var(--gold)!important;font-size:16px!important}
.qty-dot{display:inline-flex;align-items:center;justify-content:center;background:var(--gold);color:#16100a;border-radius:99px;font-size:11px;font-weight:800;padding:2px 8px;margin-left:6px;vertical-align:middle}

/* ══ TIME GRID ══ */
.time-wrap{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:9px}
.time-card{background:var(--card);border:1px solid var(--brd);border-radius:var(--rs);padding:14px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:border-color .15s,transform .15s;gap:8px}
.time-card:hover{border-color:var(--gbrd);transform:translateY(-1px)}
.time-card:active{transform:scale(.97)}
.time-dur{font-size:14px;font-weight:700;color:var(--tx)}
.time-p{font-size:14px;font-weight:800;color:var(--gold)}
.time-card .btn-add{width:32px;height:32px;font-size:19px}

/* ══ NOTE ══ */
.note{margin:18px 0 6px;background:var(--gbg);border:1px solid var(--gbrd);border-radius:var(--rs);padding:13px 16px;font-size:13px;color:var(--mu2);line-height:1.7}
.note strong{color:var(--gold)}

/* ══ SIDEBAR ══ */
.sidebar{width:360px;flex-shrink:0;background:var(--card);border-left:1px solid var(--brd);display:flex;flex-direction:column;overflow:hidden}
.sb-hd{padding:18px 20px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.sb-title{font-family:'Playfair Display',serif;font-size:18px;color:var(--tx)}
.sb-clear{background:none;border:1px solid var(--brd);color:var(--mu2);border-radius:99px;padding:5px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:border-color .15s,color .15s}
.sb-clear:hover{border-color:var(--red);color:var(--red)}
.sb-body{flex:1;overflow-y:auto;padding:12px 18px;scrollbar-width:thin;scrollbar-color:var(--brd) transparent}
.sb-body::-webkit-scrollbar{width:3px}
.sb-body::-webkit-scrollbar-thumb{background:var(--brd);border-radius:99px}
.sb-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--mu);text-align:center;padding:20px}
.sb-empty-ico{font-size:42px;opacity:.3;margin-bottom:6px}
.sb-empty-txt{font-size:14px;line-height:1.7;color:var(--mu2)}
.sb-foot{padding:14px 18px 20px;border-top:1px solid var(--brd);flex-shrink:0}

/* CART ITEM */
.ci{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--brd)}
.ci:last-child{border-bottom:none}
.ci-inf{flex:1;min-width:0}
.ci-name{font-size:14px;font-weight:600;color:var(--tx);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ci-meta{font-size:11px;color:var(--mu);margin-top:2px}
.ci-ctrl{display:flex;align-items:center;gap:5px}
.ci-b{width:27px;height:27px;border-radius:7px;border:1px solid var(--brd);background:var(--card2);font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--gold);transition:background .1s}
.ci-b:hover{background:var(--gbg)}
.ci-q{font-size:14px;font-weight:800;min-width:20px;text-align:center;color:var(--tx)}
.ci-pr{font-size:14px;font-weight:700;color:var(--gold);min-width:46px;text-align:right}
.ci-del{background:none;border:none;cursor:pointer;color:var(--mu);font-size:14px;padding:5px;border-radius:6px;transition:color .1s}
.ci-del:hover{color:var(--red)}

/* TOTAL */
.tot{display:flex;justify-content:space-between;align-items:center;background:var(--gbg);border:1px solid var(--gbrd);border-radius:var(--rs);padding:14px 16px;margin-bottom:12px}
.tot-lbl{font-size:13px;font-weight:700;color:var(--mu2);text-transform:uppercase;letter-spacing:.6px}
.tot-val{font-family:'Playfair Display',serif;font-size:26px;color:var(--gold)}

/* ══ BUTTONS ══ */
.btn{width:100%;padding:15px;border-radius:var(--r);border:none;font-size:15px;font-weight:800;font-family:inherit;cursor:pointer;transition:opacity .2s,transform .12s}
.btn-gold{background:var(--gold);color:#16100a}
.btn-gold:hover{background:var(--gold-l)}
.btn-gold:active{transform:scale(.98)}
.btn-gold:disabled{opacity:.35;cursor:not-allowed;transform:none}
.btn-ghost{background:var(--card2);color:var(--mu2);border:1px solid var(--brd)}
.btn-ghost:hover{border-color:var(--mu)}

/* ══ MOBILE BOTTOM NAV ══ */
.mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--brd);z-index:100;padding-bottom:env(safe-area-inset-bottom,0)}
.mob-nav-row{display:flex}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 4px 8px;border:none;background:none;cursor:pointer;font-family:inherit;color:var(--mu);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;gap:3px;transition:color .15s;position:relative}
.nav-btn.on{color:var(--gold)}
.nav-ico{font-size:21px;line-height:1}
.nav-badge{position:absolute;top:5px;right:calc(50% - 22px);background:var(--gold);color:#16100a;border-radius:99px;min-width:17px;height:17px;font-size:9px;font-weight:800;display:none;align-items:center;justify-content:center;padding:0 4px}
.nav-badge.on{display:flex}

/* ══ MOBILE CART DRAWER ══ */
.mob-drawer{position:fixed;inset:0;z-index:300;display:flex;flex-direction:column;background:var(--bg);transform:translateY(100%);transition:transform .28s cubic-bezier(.32,.72,0,1)}
.mob-drawer.open{transform:translateY(0)}
.mob-drawer-hd{background:var(--card);padding:16px 18px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.mob-drawer-title{font-family:'Playfair Display',serif;font-size:19px;color:var(--tx)}
.mob-drawer-back{display:flex;align-items:center;gap:6px;background:none;border:1px solid var(--brd);color:var(--mu2);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;padding:6px 14px;border-radius:99px}
.mob-drawer-back:active{background:var(--card2)}
.mob-cart-list{flex:1;overflow-y:auto;padding:14px 18px;-webkit-overflow-scrolling:touch}
.mob-cart-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--mu);text-align:center}
.mob-cart-empty-ico{font-size:52px;opacity:.3}
.mob-cart-foot{padding:14px 18px calc(14px + env(safe-area-inset-bottom,0));background:var(--card);border-top:1px solid var(--brd);flex-shrink:0}

/* ══ OVERLAY + SHEETS ══ */
.ov{position:fixed;inset:0;background:rgba(6,4,18,.88);backdrop-filter:blur(6px);z-index:400;display:none;align-items:flex-end;justify-content:center}
.ov.on{display:flex}
.sheet{background:var(--card);border-radius:22px 22px 0 0;width:100%;max-width:560px;max-height:93vh;display:none;flex-direction:column;animation:up .24s ease;border-top:1px solid var(--brd)}
.sheet.on{display:flex}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sh-handle{width:36px;height:4px;border-radius:99px;background:var(--brd);margin:12px auto 0;flex-shrink:0}
.sh-hd{padding:16px 20px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.sh-title{font-family:'Playfair Display',serif;font-size:18px;color:var(--tx)}
.sh-close{background:var(--card2);border:1px solid var(--brd);width:30px;height:30px;border-radius:99px;font-size:14px;cursor:pointer;color:var(--mu2);display:flex;align-items:center;justify-content:center;transition:color .1s}
.sh-close:hover{color:var(--tx)}
.sh-body{flex:1;overflow-y:auto;padding:16px 20px}
.sh-body::-webkit-scrollbar{width:3px}
.sh-body::-webkit-scrollbar-thumb{background:var(--brd);border-radius:99px}
.sh-foot{padding:12px 20px 22px;border-top:1px solid var(--brd);flex-shrink:0}

/* FORM */
.fg{margin-bottom:14px}
.fg label{font-size:11px;font-weight:800;color:var(--mu);display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:.6px}
.fg input{width:100%;padding:13px 15px;border:1px solid var(--brd);border-radius:var(--rs);font-size:15px;font-family:inherit;background:var(--card2);color:var(--tx);transition:border-color .2s;-webkit-appearance:none}
.fg input::placeholder{color:var(--mu)}
.fg input:focus{outline:none;border-color:var(--gold)}

/* ══ INVOICE ══ */
#invPrint{background:#18142a;padding:22px}
.inv-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px}
.inv-brand{font-family:'Playfair Display',serif}
.inv-brand-name{font-size:24px;color:var(--gold)}
.inv-brand-sub{font-size:10px;font-weight:700;color:var(--mu2);text-transform:uppercase;letter-spacing:1.4px;margin-top:4px;font-family:'Be Vietnam Pro',sans-serif}
.inv-id{font-size:18px;font-weight:800;color:var(--tx);text-align:right}
.inv-dt{font-size:11px;color:var(--mu);text-align:right;margin-top:3px}
.inv-status{display:inline-block;margin-top:7px;background:var(--gbg);border:1px solid var(--gbrd);border-radius:99px;padding:4px 14px;font-size:10px;font-weight:800;color:var(--gold);text-transform:uppercase;letter-spacing:.6px}
.inv-div{height:1px;background:var(--brd);margin:16px 0;position:relative}
.inv-div::before{content:'✦';position:absolute;left:50%;transform:translateX(-50%) translateY(-50%);background:#18142a;padding:0 10px;font-size:11px;color:var(--gold)}
.inv-cust{background:#201c30;border:1px solid var(--brd);border-radius:var(--rs);padding:13px 16px;margin-bottom:16px}
.ic-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0}
.ic-lbl{font-size:10px;font-weight:800;color:var(--mu);text-transform:uppercase;letter-spacing:.5px}
.ic-val{font-size:14px;font-weight:600;color:var(--tx)}
.inv-tbl{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:16px}
.inv-tbl th{padding:8px 9px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--mu);border-bottom:1px solid var(--brd)}
.inv-tbl th:first-child{text-align:left}
.inv-tbl th:not(:first-child){text-align:right}
.inv-tbl td{padding:9px 9px;border-bottom:1px solid var(--brd);color:var(--tx)}
.inv-tbl td:not(:first-child){text-align:right;font-weight:700}
.inv-tbl .gd{color:var(--gold)}
.inv-tbl tbody tr:last-child td{border-bottom:none}
.inv-tot{background:var(--gbg);border:1px solid var(--gbrd);border-radius:var(--rs);padding:14px 17px;display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.inv-tot-lbl{font-size:12px;font-weight:700;color:var(--mu2);text-transform:uppercase;letter-spacing:.5px}
.inv-tot-val{font-family:'Playfair Display',serif;font-size:28px;color:var(--gold)}
.qr-wrap{border:1px solid var(--gbrd);border-radius:var(--r);padding:20px 18px;text-align:center;background:#1e1a2e}
.qr-label{font-size:11px;font-weight:800;color:var(--mu2);text-transform:uppercase;letter-spacing:1px;margin-bottom:15px}
.qr-img-box{display:inline-block;background:#fff;padding:10px;border-radius:12px;margin-bottom:12px;line-height:0}
.qr-img-box img{display:block!important;width:200px!important;height:200px!important;object-fit:contain}
.qr-amt{display:inline-block;background:var(--gold);color:#16100a;border-radius:99px;padding:6px 22px;font-size:16px;font-weight:800;margin-bottom:13px}
.qr-info{font-size:12px;color:var(--mu);line-height:2}
.qr-info strong{color:var(--mu2)}
.inv-footer{margin-top:16px;background:var(--gbg);border:1px dashed var(--gbrd);border-radius:var(--rs);padding:12px 15px;font-size:11px;color:var(--mu);text-align:center;line-height:1.8}
.inv-footer em{color:var(--gold);font-style:normal;font-weight:700}

/* ══ RESPONSIVE ══ */
@media(max-width:767px){
  .sidebar{display:none}
  .mob-nav{display:block}
  .hd-cart{display:flex}
  body{padding-bottom:60px}
  .content{padding:14px 16px 20px}
  .prod-list{grid-template-columns:1fr}
  .prod-row{flex-direction:row;align-items:center;padding:14px}
  .prod-ico{font-size:20px;width:28px;text-align:center}
  .time-wrap{grid-template-columns:1fr 1fr}
}
@media(min-width:768px){
  .hd-cart{display:none}
  .mob-nav{display:none}
  .mob-drawer{display:none!important}
  .sidebar{display:flex}
}
</style>
</head>
<body>
<div class="app">

<!-- MAIN -->
<div class="main">
  <div class="hd">
    <div class="logo">
      <span class="logo-name">✦ T-Share</span>
      <div class="logo-div"></div>
      <div class="logo-sub">Trải Bài<br>Huyền Học</div>
    </div>
    <button class="hd-cart" onclick="openMobCart()">
      🛒 <span class="cart-num" id="hCartNum">0</span>
    </button>
  </div>

  <div class="tabs" id="tabBar"></div>
  <div class="content" id="content"></div>

  <nav class="mob-nav">
    <div class="mob-nav-row">
      <button class="nav-btn on" id="navSvc" onclick="navTo('svc')">
        <span class="nav-ico">🔮</span>Dịch vụ
      </button>
      <button class="nav-btn" id="navCart" onclick="navTo('cart')">
        <span class="nav-ico" style="position:relative;display:inline-block">
          🛒<span class="nav-badge" id="navBadge">0</span>
        </span>
        Giỏ hàng
      </button>
    </div>
  </nav>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sb-hd">
    <div class="sb-title">🛒 Giỏ hàng</div>
    <button class="sb-clear" onclick="clearCart()">Xóa tất cả</button>
  </div>
  <div class="sb-body" id="sbBody">
    <div class="sb-empty">
      <div class="sb-empty-ico">✨</div>
      <div class="sb-empty-txt">Chưa có dịch vụ nào<br>Thêm từ danh sách bên trái</div>
    </div>
  </div>
  <div class="sb-foot" id="sbFoot" style="display:none">
    <div class="tot">
      <span class="tot-lbl">Tổng cộng</span>
      <span class="tot-val" id="sbTot">0k</span>
    </div>
    <button class="btn btn-gold" onclick="openInfo()">Tiếp tục thanh toán →</button>
  </div>
</div>
</div>

<!-- MOBILE CART DRAWER -->
<div class="mob-drawer" id="mobDrawer">
  <div class="mob-drawer-hd">
    <div class="mob-drawer-title">🛒 Giỏ hàng</div>
    <button class="mob-drawer-back" onclick="closeMobCart()">‹ Quay lại</button>
  </div>
  <div class="mob-cart-list" id="mobCartList">
    <div class="mob-cart-empty">
      <div class="mob-cart-empty-ico">✨</div>
      <div style="font-size:15px;color:var(--mu2)">Chưa có dịch vụ nào</div>
    </div>
  </div>
  <div class="mob-cart-foot">
    <div class="tot" style="margin-bottom:12px">
      <span class="tot-lbl">Tổng cộng</span>
      <span class="tot-val" id="mobTot">0k</span>
    </div>
    <button class="btn btn-gold" id="btnMobPay" onclick="openInfo()" disabled>Tiếp tục thanh toán →</button>
  </div>
</div>

<!-- SHEETS OVERLAY -->
<div class="ov" id="ov" onclick="ovClick(event)">

  <!-- INFO SHEET -->
  <div class="sheet" id="shInfo">
    <div class="sh-handle"></div>
    <div class="sh-hd">
      <div class="sh-title">Thông tin khách hàng</div>
      <button class="sh-close" onclick="closeSheet()">✕</button>
    </div>
    <div class="sh-body">
      <div class="fg"><label>Họ và tên *</label><input id="fName" placeholder="Nguyễn Văn A" autocomplete="name"/></div>
      <div class="fg"><label>SĐT / Zalo <span style="color:var(--mu);font-weight:400">(nếu có)</span></label><input id="fPhone" placeholder="0876 159 680" type="tel" autocomplete="tel"/></div>
      <div class="fg"><label>Gmail <span style="color:var(--mu);font-weight:400">(nếu có)</span></label><input id="fEmail" placeholder="email@gmail.com" type="email" autocomplete="email"/></div>

function addEv(sku,e){e.stopPropagation();addItem(sku);}
function addItem(sku){
  if(!ALL[sku])return;
  if(!cart[sku])cart[sku]={...ALL[sku],qty:0};
  cart[sku].qty++;
  save();syncAll();renderContent();renderSidebar();renderMobCart();
  const b=document.getElementById('pa-'+sku);
  if(b){b.textContent='✓';b.classList.add('ok');setTimeout(()=>{if(b){b.textContent='+';b.classList.remove('ok');}},600);}
}
function decItem(sku){
  if(!cart[sku])return;
  cart[sku].qty--;
  if(cart[sku].qty<=0)delete cart[sku];
  save();syncAll();renderSidebar();renderMobCart();
}
function delItem(sku){delete cart[sku];save();syncAll();renderSidebar();renderMobCart();}
function clearCart(){cart={};save();syncAll();renderSidebar();renderMobCart();}

function downloadPNG(){
  const el=document.getElementById('invPrint');
  if(!el||typeof html2canvas==='undefined'){alert('Đang tải thư viện, thử lại!');return;}
  const btn=document.getElementById('btnDL');
  btn.textContent='⏳ Đang chuẩn bị...';btn.disabled=true;

  const qrImg=document.getElementById('qrImg');

  function doCapture(){
    html2canvas(el,{
      backgroundColor:'#18142a',scale:2.5,useCORS:false,
      allowTaint:true,logging:false,imageTimeout:0
    }).then(canvas=>{
      const a=document.createElement('a');
      a.download='tshare-hoadon-'+Date.now()+'.png';
      a.href=canvas.toDataURL('image/png');
      a.click();
      btn.textContent='⬇ Tải ảnh hóa đơn';btn.disabled=false;
    }).catch(()=>{
      alert('Không thể xuất ảnh, hãy chụp màn hình thay thế.');
      btn.textContent='⬇ Tải ảnh hóa đơn';btn.disabled=false;
    });
  }

  if(!qrImg||qrImg.src.startsWith('data:')){doCapture();return;}

  btn.textContent='⏳ Đang tải QR...';
  fetch(qrImg.src)
    .then(r=>{if(!r.ok)throw new Error();return r.blob();})
    .then(blob=>new Promise((res,rej)=>{
      const reader=new FileReader();
      reader.onload=()=>res(reader.result);
      reader.onerror=rej;
      reader.readAsDataURL(blob);
    }))
    .then(dataUrl=>{
      qrImg.onload=()=>setTimeout(doCapture,100);
      qrImg.onerror=()=>doCapture();
      qrImg.src=dataUrl;
    })
    .catch(()=>doCapture());
}
